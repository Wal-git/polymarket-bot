bot:
  poll_interval_seconds: 1          # price polling cadence
  dry_run: false                    # LIVE trading enabled
  state_file: ./data/state.json
  halt_file: ./HALT
  log_level: INFO

# Per-asset configuration. The engine runs one lifecycle pipeline per
# enabled asset using the same shared CLOB client, position tracker, and
# bankroll. Signal/sizing thresholds default to the ``strategy:`` block
# below; per-asset overrides go in ``assets.<name>.thresholds``.
assets:
  BTC:
    enabled: true
    slug_prefix: "btc-updown-5m"
    slot_base_timestamp: 1772568900   # unix seconds, anchor for the 5-min grid
    slot_interval_s: 300
    spot_urls:
      binance:  "https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT"
      coinbase: "https://api.coinbase.com/v2/prices/BTC-USD/spot"
      kraken:   "https://api.kraken.com/0/public/Ticker?pair=XBTUSD"
      bitstamp: "https://www.bitstamp.net/api/v2/ticker/btcusd/"
      okx:      "https://www.okx.com/api/v5/market/ticker?instId=BTC-USDT"
    futures_url: "https://fapi.binance.com/fapi/v1/premiumIndex?symbol=BTCUSDT"
    chainlink_aggregator: "0xc907E116054Ad103354f2D350FD2514433D57F6f"  # Polygon BTC/USD
    chainlink_rpc_url: "https://1rpc.io/matic"
    calibration_table_path: "data/calibration_table.json"
    # No threshold overrides — BTC uses the strategy.signals defaults below.

strategy:
  name: btc_5min
  market_filter:
    asset: BTC
    window: 5m
    slug_prefix: "btc-updown-5m-"

  signals:
    divergence:
      min_gap_usd: 100.0            # Per-exchange gap past price_to_beat for a "vote"
      max_gap_usd: 0.0              # Off (0 = disabled) — was 200.0; previously rejected over-extended divergences
      fast_pass_enabled: false      # Off — only fire via N-of-M agreement, not single-exchange spikes
      fast_pass_usd: 125.0          # (unused while fast_pass_enabled=false)
      min_agreement: 3              # N-of-M exchanges must agree past min_gap (3-of-5 default)
      require_chainlink_gap: true
    imbalance:
      buy_threshold: 1.8            # retained for data capture only — not used as a trade gate
      sell_threshold: 0.55
      detection_window_seconds: [30, 90]
      depth_levels: 10
    chainlink:
      enabled: true                 # log chainlink price/lag in evaluations (no gating yet)
      rpc_url: "https://1rpc.io/matic"
      aggregator_address: "0xc907E116054Ad103354f2D350FD2514433D57F6f"  # Polygon BTC/USD
    futures:
      enabled: true                 # log Binance Futures mark/funding in evaluations (no gating yet)
      url: "https://fapi.binance.com/fapi/v1/premiumIndex?symbol=BTCUSDT"
    calibration:
      enabled: false                # off until we have ~200+ trades — table is too sparse
      table_path: "data/calibration_table.json"
      min_n: 5                      # min trials per cell before using it (else fallback)
      fallback_confidence: 0.75     # used when no bucket and global both insufficient
    macro:
      enabled: true                 # log VIX / DXY / ES futures into evaluations (no gating)
                                    # Review value after ~4 weeks of data — if no signal, delete this feed.

  entry:
    window_seconds: [60, 180]       # skip signals outside this range after market open
    order_type: LIMIT
    price: best_ask

  exit:
    profit_target: 0.75             # sell when shares hit 75c
    stop_loss: 0.35                 # sell when shares drop to 35c
    hold_to_resolution_s_remaining: 60   # if less than 60s left, hold to resolution

  sizing:
    mode: kelly
    kelly_fraction: 0.25            # quarter-Kelly safety cap
    min_trade_usdc: 30
    max_trade_usdc: 200
    min_confidence: 0.80            # reject trades below this confidence
    double_min_above_usd: 200.0     # either exchange delta >= this → double the minimum bet

  bankroll:
    source: wallet_balance          # live USDC balance; alternative: "fixed"
    safety_cap_pct: 1.0             # fraction of wallet usable as bankroll

risk:
  max_open_positions: 2
  daily_loss_limit_usdc: 100        # kill switch: stop new entries at -$100/day
  max_total_exposure_pct: 0.50
  max_position_usdc: 200
