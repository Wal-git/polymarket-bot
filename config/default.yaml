bot:
  poll_interval_seconds: 30
  dry_run: false
  state_file: ./data/state.json
  log_level: INFO
  halt_file: ./HALT

market_filter:
  min_volume_24h_usdc: 10000

risk:
  max_total_exposure_pct: 0.20
  max_position_usdc: 200
  max_single_bet_usdc: 50
  stop_loss_pct: 0.30

strategies:
  - name: example
    module: polybot.strategies.example
    enabled: false
    config:
      min_edge: 0.05

  - name: smart_money
    module: strategies.smart_money
    enabled: true
    config:
      # YAML wallets are the fallback if smart_wallets_signal.json doesn't exist yet.
      wallets:
        - "0x9d84ce0306f8551e02efef1680475fc0f1dc1344"  # domah
        - "0x3cf3e8d5427aed066a7a5926980600f6c3cf87b3"  # 50pence
        - "0x6356fb47642a028bc09df92023c35a21a0b41885"  # fhantom
        - "0x7c3db723f1d4d8cb9c550095203b686cb11e5c6b"  # car
        - "0x56687bf447db6ffa42ffe2204a05edaa20f55839"  # theo4
      lookback_minutes: 60
      # Require at least 2 distinct wallets to buy the same outcome.
      min_wallet_buys: 2
      # Minimum sum of wallet scores across buyers (confluence gate).
      min_confluence_weight: 1.5
      # Don't chase outcomes priced above 0.75 — edge disappears at high prices.
      max_entry_price: 0.75
      # Base size; scales proportionally with confluence weight up to max_weight_cap.
      size_usdc: 10
      max_weight_cap: 5.0
      # Skip entry if current ask is >10% above whale's avg fill price.
      max_price_slippage_pct: 0.10
      # Minimum minutes between signals on the same market.
      cooldown_minutes: 15
